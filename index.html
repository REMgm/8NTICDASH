<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8NTIC — Control Center v2.1</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f1a;--card:#1a1a2e;--text:#fff;--muted:#a0a0b0;--accent:#0ea5e9;--green:#22c55e;--amber:#f59e0b;--purple:#a855f7}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);margin:0;min-height:100vh}
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a1a2e 0%,#0f0f1a 100%)}
.login-box{background:var(--card);padding:40px;border-radius:16px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.login h1{margin:0 0 8px;font-size:32px;background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login p{color:var(--muted);margin:0 0 24px;font-size:14px}
input{width:100%;padding:12px 16px;background:#0f0f1a;border:1px solid #2a2a3e;border-radius:8px;color:var(--text);font-size:14px;margin-bottom:12px;box-sizing:border-box}
input:focus{outline:none;border-color:var(--accent)}
button{cursor:pointer;border:none;font-family:inherit}
.btn-primary{width:100%;padding:12px;background:var(--accent);color:#fff;border-radius:8px;font-weight:600;font-size:14px}
.btn-primary:hover{opacity:.9}
.app{display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--card);padding:20px 0;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0}
.sidebar-logo{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;padding:0 20px 20px;display:flex;align-items:center;gap:8px}
.dot{width:10px;height:10px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.nav-item{display:flex;align-items:center;gap:10px;padding:12px 20px;color:var(--muted);cursor:pointer;font-size:14px}
.nav-item:hover,.nav-item.active{color:var(--text);background:rgba(14,165,233,.1)}
.main{margin-left:240px;flex:1;padding:24px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.header h1{margin:0;font-size:24px}
.header p{margin:4px 0 0;color:var(--muted);font-size:13px}
.time-selector{display:flex;gap:4px;background:#0f0f1a;padding:4px;border-radius:8px;border:1px solid #2a2a3e}
.time-btn{padding:8px 14px;border-radius:6px;background:transparent;color:var(--muted);font-size:13px;font-weight:600;border:none;font-family:'JetBrains Mono',monospace}
.time-btn.active{background:var(--accent);color:#fff}
.update-btn{padding:10px 18px;background:var(--accent);color:#fff;border-radius:8px;font-weight:600;display:flex;align-items:center;gap:6px}
.update-btn:disabled{opacity:.5;cursor:not-allowed}
.spin{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.card{background:var(--card);padding:20px;border-radius:12px;border:1px solid #2a2a3e}
.stat{text-align:center}
.stat-value{font-size:36px;font-weight:700;font-family:'JetBrains Mono',monospace}
.stat-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.chart-card{grid-column:span 2}
.chart{height:200px}
.commits{max-height:300px;overflow-y:auto}
.commit{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid #2a2a3e}
.commit:last-child{border-bottom:none}
.commit-avatar{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;font-family:'JetBrains Mono',monospace}
.commit-content{flex:1;min-width:0}
.commit-msg{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.commit-meta{display:flex;gap:12px;font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.repo-badge{padding:2px 6px;background:#2a2a3e;border-radius:4px;font-size:11px}
.empty{text-align:center;padding:40px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:16px}
.toast{position:fixed;bottom:24px;right:24px;padding:16px 20px;background:var(--card);border-radius:8px;border:1px solid #2a2a3e;box-shadow:0 10px 40px rgba(0,0,0,.5);display:flex;align-items:center;gap:10px;animation:slideIn .3s ease}
.toast.success{border-left:3px solid var(--green)}
.toast.error{border-left:3px solid #ef4444}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}}
.agent{display:flex;align-items:center;gap:12px;padding:16px;margin-bottom:12px;background:var(--card);border-radius:12px;border:1px solid #2a2a3e}
.agent-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace}
.agent-info{flex:1}
.agent-name{font-weight:600;margin-bottom:2px}
.agent-role{font-size:13px;color:var(--muted)}
.agent-meta{display:flex;gap:8px;margin-top:6px}
.tag{font-size:11px;padding:3px 8px;background:#0f0f1a;border-radius:12px}
.status{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
.project{padding:20px;margin-bottom:16px;background:var(--card);border-radius:12px;border:1px solid #2a2a3e}
.project-header{display:flex;justify-content:space-between;align-items:start;margin-bottom:8px}
.project-title{font-weight:600;font-size:16px}
.project-desc{font-size:14px;color:var(--muted);margin-bottom:12px}
.progress{height:6px;background:#0f0f1a;border-radius:3px;margin-top:12px;overflow:hidden}
.progress-fill{height:100%;background:var(--green);border-radius:3px;transition:width .5s ease}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

const AGENTS = {
  REM: { color: '#0ea5e9', icon: 'R' },
  SMARTY: { color: '#22c55e', icon: 'S' },
  KIMI: { color: '#f59e0b', icon: 'K' },
  UMBREL: { color: '#a855f7', icon: 'U' },
  CLAUDE: { color: '#38bdf8', icon: 'C' },
  GEMINI: { color: '#f472b6', icon: 'G' },
  PERPLEXITY: { color: '#fb923c', icon: 'P' },
};

const REPOS = ['8NTIC', '8NTICDASH', '8NTICLAB', 'startwithopenclaw', 'sundai-motivation'];
const TIMES = [
  { key: 'hour', label: '1H', ms: 60*60*1000 },
  { key: 'day', label: '1D', ms: 24*60*60*1000 },
  { key: 'week', label: '1W', ms: 7*24*60*60*1000 },
  { key: 'month', label: '1M', ms: 30*24*60*60*1000 },
];

function App() {
  const [user, setUser] = useState(() => {
    const s = localStorage.getItem('8ntic_session');
    return s ? JSON.parse(s) : null;
  });
  const [page, setPage] = useState('dashboard');
  const [commits, setCommits] = useState([]);
  const [loading, setLoading] = useState(false);
  const [timeFrame, setTimeFrame] = useState('day');
  const [toast, setToast] = useState(null);
  const chartRef = useRef(null);

  const fetchData = useCallback(async (showToast = false) => {
    setLoading(true);
    try {
      const all = [];
      for (const repo of REPOS) {
        try {
          const res = await fetch(`https://api.github.com/repos/REMgm/${repo}/commits?per_page=30`);
          if (res.ok) {
            const data = await res.json();
            all.push(...data.map(c => ({...c, repo})));
          }
        } catch (e) {}
      }
      all.sort((a, b) => new Date(b.commit.author.date) - new Date(a.commit.author.date));
      setCommits(all);
      if (showToast) setToast({ msg: `Loaded ${all.length} commits`, type: 'success' });
    } catch (e) {
      setToast({ msg: 'Failed to load data', type: 'error' });
    }
    setLoading(false);
  }, []);

  useEffect(() => {
    if (user) fetchData();
  }, [user]);

  const filtered = useMemo(() => {
    const t = TIMES.find(x => x.key === timeFrame).ms;
    const cutoff = Date.now() - t;
    return commits.filter(c => new Date(c.commit.author.date).getTime() > cutoff);
  }, [commits, timeFrame]);

  const stats = useMemo(() => {
    const byAgent = {};
    filtered.forEach(c => {
      const name = c.commit.author.name;
      const key = Object.keys(AGENTS).find(k => name.toLowerCase().includes(k.toLowerCase())) || 'REM';
      byAgent[key] = (byAgent[key] || 0) + 1;
    });
    return { total: filtered.length, byAgent };
  }, [filtered]);

  if (!user) return <Login onLogin={u => { setUser(u); localStorage.setItem('8ntic_session', JSON.stringify(u)); }} />;

  return (
    <div className="app">
      <Sidebar page={page} setPage={setPage} user={user} onLogout={() => { localStorage.removeItem('8ntic_session'); setUser(null); }} />
      <main className="main">
        {page === 'dashboard' && <Dashboard 
          commits={filtered} 
          stats={stats} 
          timeFrame={timeFrame} 
          setTimeFrame={setTimeFrame}
          loading={loading}
          onUpdate={() => fetchData(true)}
          chartRef={chartRef}
        />}
        {page === 'agents' && <Agents commits={commits} />}
        {page === 'missions' && <Missions />}
        {toast && <Toast {...toast} onClose={() => setToast(null)} />}
      </main>
    </div>
  );
}

function Login({ onLogin }) {
  const [email, setEmail] = useState('');
  const [pass, setPass] = useState('');
  const login = () => {
    if (email === '4remgm@gmail.com' && pass === 'Letmeinn0w4321@!') {
      onLogin({ email, name: 'REM', role: 'admin' });
    }
  };
  return (
    <div className="login">
      <div className="login-box">
        <h1>8NTIC</h1>
        <p>Control Center</p>
        <input placeholder="Email" value={email} onChange={e => setEmail(e.target.value)} />
        <input type="password" placeholder="Password" value={pass} onChange={e => setPass(e.target.value)} />
        <button className="btn-primary" onClick={login}>Enter</button>
      </div>
    </div>
  );
}

function Sidebar({ page, setPage, user, onLogout }) {
  const items = [
    { id: 'dashboard', label: 'Dashboard', icon: '◆' },
    { id: 'agents', label: 'Agents', icon: '●' },
    { id: 'missions', label: 'Missions', icon: '▲' },
  ];
  return (
    <aside className="sidebar">
      <div className="sidebar-logo"><span className="dot"></span>8NTIC</div>
      <nav>
        {items.map(i => (
          <div key={i.id} className={`nav-item ${page === i.id ? 'active' : ''}`} onClick={() => setPage(i.id)}>
            <span>{i.icon}</span> {i.label}
          </div>
        ))}
      </nav>
      <div style={{marginTop:'auto',padding:'20px',borderTop:'1px solid #2a2a3e'}}>
        <div style={{fontSize:13,fontWeight:600}}>{user.name}</div>
        <div style={{fontSize:12,color:'var(--muted)'}}>{user.role}</div>
        <button onClick={onLogout} style={{marginTop:12,padding:'8px 12px',background:'transparent',color:'var(--muted)',border:'1px solid #2a2a3e',borderRadius:6,cursor:'pointer',fontSize:12}}>Exit</button>
      </div>
    </aside>
  );
}

function Dashboard({ commits, stats, timeFrame, setTimeFrame, loading, onUpdate, chartRef }) {
  return (
    <div>
      <div className="header">
        <div>
          <h1>Dashboard</h1>
          <p>8NTIC Reflective Agent Mesh • {commits.length} commits loaded</p>
        </div>
        <div style={{display:'flex',gap:12,alignItems:'center'}}>
          <div className="time-selector">
            {TIMES.map(t => (
              <button key={t.key} className={`time-btn ${timeFrame === t.key ? 'active' : ''}`} onClick={() => setTimeFrame(t.key)}>
                {t.label}
              </button>
            ))}
          </div>
          <button className="update-btn" onClick={onUpdate} disabled={loading}>
            <span className={loading ? 'spin' : ''}>↻</span> {loading ? 'Loading...' : 'Update'}
          </button>
        </div>
      </div>
      
      <div className="grid">
        <Card><Stat value={Object.keys(AGENTS).length} label="Agents" color="var(--accent)" /></Card>
        <Card><Stat value={stats.total} label="Commits" color="var(--green)" /></Card>
        <Card><Stat value={3} label="Missions" color="var(--amber)" /></Card>
        <Card><Stat value="$10" label="Revenue" color="var(--purple)" /></Card>
        
        <div className="card chart-card">
          <div style={{fontWeight:600,marginBottom:12}}>Activity</div>
          <div ref={chartRef} className="chart">
            <Chart commits={commits} />
          </div>
        </div>
        
        <div className="card chart-card">
          <div style={{fontWeight:600,marginBottom:12}}>Recent Commits</div>
          <div className="commits">
            {commits.length === 0 ? (
              <div className="empty">
                <div className="empty-icon">📭</div>
                <div>No commits in this time frame</div>
              </div>
            ) : commits.slice(0, 10).map(c => {
              const author = c.commit.author.name;
              const agent = Object.keys(AGENTS).find(k => author.toLowerCase().includes(k.toLowerCase())) || 'REM';
              const cfg = AGENTS[agent];
              const time = new Date(c.commit.author.date).toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit'});
              return (
                <div key={c.sha} className="commit">
                  <div className="commit-avatar" style={{background:cfg.color,color:'#fff'}}>{cfg.icon}</div>
                  <div className="commit-content">
                    <div className="commit-msg">{c.commit.message.split('\n')[0]}</div>
                    <div className="commit-meta">
                      <span style={{color:cfg.color}}>{agent}</span>
                      <span className="repo-badge">{c.repo}</span>
                      <span>{time}</span>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

function Card({ children }) {
  return <div className="card stat">{children}</div>;
}

function Stat({ value, label, color }) {
  return (
    <div>
      <div className="stat-value" style={{color}}>{value}</div>
      <div className="stat-label">{label}</div>
    </div>
  );
}

function Chart({ commits }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  
  useEffect(() => {
    if (!canvasRef.current) return;
    const ctx = canvasRef.current.getContext('2d');
    
    if (chartRef.current) chartRef.current.destroy();
    
    const byHour = {};
    commits.forEach(c => {
      const h = new Date(c.commit.author.date).getHours();
      byHour[h] = (byHour[h] || 0) + 1;
    });
    
    const labels = Object.keys(byHour).sort().map(h => `${h}:00`);
    const data = Object.keys(byHour).sort().map(h => byHour[h]);
    
    chartRef.current = new ChartJS(ctx, {
      type: 'bar',
      data: { labels, datasets: [{ data, backgroundColor: 'var(--accent)', borderRadius: 4 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false } }, y: { grid: { color: '#2a2a3e' } } } }
    });
    
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [commits]);
  
  return <canvas ref={canvasRef} style={{width:'100%',height:'100%'}} />;
}

function Agents({ commits }) {
  const counts = {};
  commits.forEach(c => {
    const name = c.commit.author.name;
    const key = Object.keys(AGENTS).find(k => name.toLowerCase().includes(k.toLowerCase())) || 'REM';
    counts[key] = (counts[key] || 0) + 1;
  });
  
  return (
    <div>
      <div className="header">
        <div><h1>Agents</h1><p style={{color:'var(--muted)'}}>7 identities in the mesh</p></div>
      </div>
      {Object.entries(AGENTS).map(([id, cfg]) => (
        <div key={id} className="agent">
          <div className="agent-icon" style={{background:cfg.color,color:'#fff'}}>{cfg.icon}</div>
          <div className="agent-info">
            <div className="agent-name">{id}</div>
            <div className="agent-role">Agent</div>
            <div className="agent-meta">
              <span className="tag">{counts[id] || 0} commits</span>
              <span className="tag">online</span>
            </div>
          </div>
          <div className="status"></div>
        </div>
      ))}
    </div>
  );
}

function Missions() {
  const missions = [
    { name: 'Genesis Ping', status: 'completed', progress: 100, desc: 'Communication protocol test' },
    { name: 'OpenClaw QuickStart', status: 'active', progress: 75, desc: '$10 setup service' },
    { name: '8NTIC Dashboard', status: 'active', progress: 90, desc: 'Real-time control center' },
  ];
  
  return (
    <div>
      <div className="header">
        <div><h1>Missions</h1><p style={{color:'var(--muted)'}}>Active and completed missions</p></div>
      </div>
      {missions.map(m => (
        <div key={m.name} className="project">
          <div className="project-header">
            <div className="project-title">{m.name}</div>
            <span style={{fontSize:12,padding:'4px 10px',background:m.status==='completed'?'#22c55e20':'#f59e0b20',color:m.status==='completed'?'#22c55e':'#f59e0b',borderRadius:12}}>{m.status}</span>
          </div>
          <div className="project-desc">{m.desc}</div>
          <div className="progress"><div className="progress-fill" style={{width:`${m.progress}%`}}></div></div>
        </div>
      ))}
    </div>
  );
}

function Toast({ msg, type, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return <div className={`toast ${type}`}><span>{type === 'success' ? '✓' : '✗'}</span>{msg}</div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
