<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8NTIC Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f1a;color:#fff;min-height:100vh}
.login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{background:#1a1a2e;padding:40px;border-radius:16px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
h1{margin:0 0 8px;font-size:32px;background:linear-gradient(135deg,#0ea5e9,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
p{color:#a0a0b0;margin:0 0 24px}
input{width:100%;padding:14px 16px;background:#0f0f1a;border:1px solid #2a2a3e;border-radius:8px;color:#fff;font-size:15px;margin-bottom:12px}
input:focus{outline:none;border-color:#0ea5e9}
button{width:100%;padding:14px;background:#0ea5e9;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer}
button:hover{opacity:.9}
.error{color:#ef4444;font-size:13px;margin-top:12px;text-align:center}
#app{display:none}
.sidebar{background:#1a1a2e;width:240px;height:100vh;position:fixed;left:0;top:0;padding:20px 0}
.sidebar-logo{font-family:monospace;font-size:22px;font-weight:700;padding:0 20px 20px;display:flex;align-items:center;gap:8px}
.dot{width:10px;height:10px;background:#22c55e;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.nav-item{padding:12px 20px;color:#a0a0b0;cursor:pointer;font-size:14px}
.nav-item:hover,.nav-item.active{color:#fff;background:rgba(14,165,233,.1)}
.main{margin-left:240px;padding:24px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.header h1{font-size:24px}
.card{background:#1a1a2e;padding:20px;border-radius:12px;margin-bottom:16px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat{text-align:center}
.stat-value{font-size:36px;font-weight:700;color:#0ea5e9}
.stat-label{font-size:12px;color:#a0a0b0;text-transform:uppercase;margin-top:4px}
.btn{padding:10px 16px;background:#0ea5e9;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:600}
.time-selector{display:flex;gap:4px;background:#0f0f1a;padding:4px;border-radius:8px}
.time-btn{padding:8px 14px;border-radius:6px;background:transparent;color:#a0a0b0;border:none;font-weight:600;cursor:pointer}
.time-btn.active{background:#0ea5e9;color:#fff}
.commit{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid #2a2a3e}
.commit-avatar{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:monospace}
.workflow-step{display:flex;align-items:center;gap:12px;padding:12px;background:#0f0f1a;border-radius:8px;margin-bottom:8px}
.step-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px}
.step-icon.done{background:#22c55e;color:#000}
.step-icon.pending{background:#2a2a3e;color:#a0a0b0}
.step-icon.running{background:#f59e0b;color:#000}
@media(max-width:768px){
.sidebar{width:100%;height:auto;position:relative;padding:10px}
.main{margin-left:0}
.grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<div id="login" class="login">
  <div class="login-box">
    <h1>8NTIC</h1>
    <p>Control Center</p>
    <input type="email" id="email" placeholder="Email" value="4remgm@gmail.com">
    <input type="password" id="password" placeholder="Password">
    <button onclick="doLogin()">Enter</button>
    <div id="error" class="error"></div>
  </div>
</div>

<div id="app">
  <div class="sidebar">
    <div class="sidebar-logo"><span class="dot"></span>8NTIC</div>
    <div class="nav-item active" onclick="showPage('dashboard')">◆ Dashboard</div>
    <div class="nav-item" onclick="showPage('agents')">● Agents</div>
    <div class="nav-item" onclick="showPage('missions')">▲ Missions</div>
    <div class="nav-item" onclick="showPage('workflows')">⚡ Antfarm</div>
  </div>
  
  <div class="main">
    <div id="dashboard-page">
      <div class="header">
        <div>
          <h1>Dashboard</h1>
          <p style="color:#a0a0b0">8NTIC Reflective Agent Mesh</p>
        </div>
        <div style="display:flex;gap:12px;align-items:center">
          <div class="time-selector">
            <button class="time-btn active" onclick="setTime(this,'day')">1D</button>
            <button class="time-btn" onclick="setTime(this,'week')">1W</button>
          </div>
          <button class="btn" onclick="refreshData()">↻ Update</button>
        </div>
      </div>
      
      <div class="grid">
        <div class="card stat"><div class="stat-value">7</div><div class="stat-label">Agents</div></div>
        <div class="card stat"><div class="stat-value" id="commit-count">0</div><div class="stat-label">Commits</div></div>
        <div class="card stat"><div class="stat-value">3</div><div class="stat-label">Missions</div></div>
        <div class="card stat"><div class="stat-value">$10</div><div class="stat-label">Revenue</div></div>
      </div>
      
      <div class="card">
        <h3 style="margin-bottom:16px">🐜 Antfarm Workflow</h3>
        <div class="workflow-step">
          <div class="step-icon done">✓</div>
          <div>Plan (planner)</div>
        </div>
        <div class="workflow-step">
          <div class="step-icon running">◐</div>
          <div>Setup (setup)</div>
        </div>
        <div class="workflow-step">
          <div class="step-icon pending">○</div>
          <div>Implement (developer)</div>
        </div>
        <div class="workflow-step">
          <div class="step-icon pending">○</div>
          <div>Verify (verifier)</div>
        </div>
      </div>
      
      <div class="card">
        <h3 style="margin-bottom:16px">Recent Commits</h3>
        <div id="commits-list">Loading...</div>
      </div>
    </div>
  </div>
</div>

<script>
const AGENTS = {REM:'#0ea5e9',KIMI:'#f59e0b',SMARTY:'#22c55e',UMBREL:'#a855f7'};

function doLogin() {
  const email = document.getElementById('email').value;
  const pass = document.getElementById('password').value;
  if(email === '4remgm@gmail.com' && pass === 'Letmeinn0w4321@!') {
    localStorage.setItem('8ntic_session','1');
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadData();
  } else {
    document.getElementById('error').textContent = 'Invalid credentials';
  }
}

function loadData() {
  fetch('https://api.github.com/repos/REMgm/8NTIC/commits?per_page=10')
    .then(r => r.json())
    .then(data => {
      document.getElementById('commit-count').textContent = data.length;
      let html = '';
      data.forEach(c => {
        const author = c.commit.author.name;
        const agent = Object.keys(AGENTS).find(k => author.toLowerCase().includes(k.toLowerCase())) || 'REM';
        const color = AGENTS[agent];
        html += `<div class="commit">
          <div class="commit-avatar" style="background:${color}">${agent[0]}</div>
          <div>
            <div>${c.commit.message.split('\n')[0]}</div>
            <div style="color:#a0a0b0;font-size:12px">${agent} • ${new Date(c.commit.author.date).toLocaleTimeString()}</div>
          </div>
        </div>`;
      });
      document.getElementById('commits-list').innerHTML = html;
    })
    .catch(() => {
      document.getElementById('commits-list').innerHTML = '<div style="color:#a0a0b0">API rate limited. Try again later.</div>';
    });
}

function refreshData() { loadData(); }
function setTime(btn, time) {
  document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
function showPage(page) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  event.target.classList.add('active');
}

if(localStorage.getItem('8ntic_session')) {
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadData();
}
</script>
</body>
</html>
